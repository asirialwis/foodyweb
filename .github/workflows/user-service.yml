name: User Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'user-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'user-service/**'

env:
  SERVICE_NAME: user-service
  DOCKER_IMAGE: food-ordering-app/user-service

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./user-service

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './user-service/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test -- --passWithNoTests

      - name: Run test coverage
        run: npm run test:cov -- --passWithNoTests

      - name: Build
        run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ./user-service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.SERVICE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Cloud
        run: |
          echo "Deploying ${{ env.SERVICE_NAME }} to cloud..."
          # Add your cloud deployment commands here
          # Example for AWS ECS:
          # aws ecs update-service --cluster food-ordering-cluster --service user-service --force-new-deployment
          # Example for Azure Container Apps:
          # az containerapp update --name user-service --resource-group food-ordering-rg --image ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.sha }}
